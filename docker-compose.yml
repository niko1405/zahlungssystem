services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: invoice_user
      POSTGRES_PASSWORD: invoice_password
      POSTGRES_DB: invoice_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - invoice_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_user -d invoice_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP protocol
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - invoice_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # gRPC Invoice Service
  grpc-server:
    build:
      context: .
      dockerfile: Dockerfile.grpc_server
    environment:
      DATABASE_URL: postgresql://invoice_user:invoice_password@postgres:5432/invoice_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F?heartbeat=300&blocked_connection_timeout=300
      PYTHONPATH: /app/app
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - invoice_network

  # Payment Processing Service
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.payment_service
    environment:
      DATABASE_URL: postgresql://invoice_user:invoice_password@postgres:5432/invoice_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F?heartbeat=300&blocked_connection_timeout=300
      PYTHONPATH: /app/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - invoice_network

  # pgAdmin Web UI for PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - invoice_network

volumes:
  postgres_data:
  rabbitmq_data:
  pgadmin_data:

networks:
  invoice_network:
    driver: bridge
