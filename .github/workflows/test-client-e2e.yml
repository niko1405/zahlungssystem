name: Test Client E2E

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  client-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start integration stack
        run: docker compose up -d --build postgres rabbitmq grpc-server payment-service

      - name: Wait for services to be ready
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/%2F?heartbeat=300&blocked_connection_timeout=300
        run: |
          set -e
          for i in $(seq 1 24); do
            echo "Readiness check attempt $i/24"

            grpc_ready=0
            python -c "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=2); print('gRPC is ready')" || grpc_ready=$?

            rabbit_ready=0
            python -c "import os,pika; url=os.environ['RABBITMQ_URL']; conn=pika.BlockingConnection(pika.URLParameters(url)); conn.close(); print('RabbitMQ is ready')" || rabbit_ready=$?

            if [[ "$grpc_ready" -eq 0 && "$rabbit_ready" -eq 0 ]]; then
              echo "All required services are ready"
              exit 0
            fi

            sleep 5
          done

          echo "Services did not become ready in time"
          docker compose ps
          exit 1

      - name: Run test client (with startup retry)
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/%2F?heartbeat=300&blocked_connection_timeout=300
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "Client run attempt ${attempt}/3"
            if python client/test_client.py; then
              echo "Client test run succeeded"
              exit 0
            fi
            if [[ "$attempt" -lt 3 ]]; then
              echo "Client test run failed, retrying in 10s..."
              sleep 10
            fi
          done

          echo "Client test failed after retries"
          exit 1

      - name: Print service logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color grpc-server payment-service rabbitmq postgres || true

      - name: Tear down stack
        if: always()
        run: docker compose down -v
